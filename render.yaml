services:
  - type: web
    name: realestate-estimator
    env: python
    buildCommand: pip install --extra-index-url https://download.pytorch.org/whl/cpu torch==2.1.0+cpu && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
